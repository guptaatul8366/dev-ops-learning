name: Build wf
on:
  push:
    branches:
      - main 

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4
        
      - name: Maven Build
        run: mvn install  

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-war
          path: target/*.war

  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: Run Test on main branch
        run: mvn test

      - name: Checkstyle
        run: mvn checkstyle:checkstyle              
                      
