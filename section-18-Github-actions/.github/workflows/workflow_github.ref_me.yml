name: Reference Workflow
on:
  push:
    branches: [ "main", "develop"]
  pull_request:
     branches: [ "main", "develop"]
  workflow-dispatch:
  schedule:
    - cron: "10 14 * * 1-6" # After noon 2:10 pm, Monday to Saturday

permissions:
  contents: read    

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: maven build
        run: mvn install

      - name: upload artifacts (war)
        uses: actions/upload-artifacts@v5
        with:
          name: build-artifact_completed
          path: target/*.war
      - name: notify if build fails
        if: failure()
        run: echo " BUild is failed ,  because of some error, please check the logs"    

  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: run test for main branch merge
        if: github.ref == 'refs/heads/main'
        run: mvn test
      - name: checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle  
      - name: run test for other branches
        if: github.ref != 'refs/heads/main'
        run: mvn test  

      

         

          